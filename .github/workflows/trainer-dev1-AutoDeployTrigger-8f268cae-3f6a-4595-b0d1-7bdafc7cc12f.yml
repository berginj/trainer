name: Trigger auto deployment for trainer-dev1

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACR_NAME: trainerdevacr
  ACR_LOGIN_SERVER: trainerdevacr.azurecr.io
  CONTAINER_APP_NAME: trainer-dev1
  RESOURCE_GROUP: rg-trainer-dev
  APP_BASE_URL: https://trainer-dev1.greenground-5002c3bc.eastus2.azurecontainerapps.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve deploy SHA
        run: echo "DEPLOY_SHA=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_ENV"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TRAINERDEV1_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TRAINERDEV1_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TRAINERDEV1_AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build image in Azure Container Registry
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$CONTAINER_APP_NAME:${DEPLOY_SHA}" \
            --file Dockerfile \
            .

      - name: Run database migrations
        shell: bash
        run: |
          set -euo pipefail
          DATABASE_URL="$(az containerapp secret show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --secret-name database-url \
            --query value \
            --output tsv)"
          if [ -z "$DATABASE_URL" ]; then
            echo "Container App database-url secret is empty; refusing to deploy without migrations."
            exit 1
          fi
          echo "::add-mask::$DATABASE_URL"
          export DATABASE_URL
          npm run prisma:migrate:deploy

      - name: Deploy Container App revision
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$CONTAINER_APP_NAME:${DEPLOY_SHA}" \
            --set-env-vars \
              NODE_ENV=production \
              AUTH_ENFORCEMENT=on \
              DATABASE_URL=secretref:database-url \
              AUTH_SECRET=secretref:auth-secret \
              TOKEN_ENCRYPTION_KEY=secretref:token-encryption-key \
              TOKEN_ENCRYPTION_KEY_VERSION=v1 \
              MICROSOFT_AUTH_CLIENT_ID=ccdda902-1f14-4bb8-a651-64ceb12e9f1d \
              MICROSOFT_AUTH_CLIENT_SECRET=secretref:microsoft-auth-client-secret \
              SEED_CYCLONES_MVP=off \
            --min-replicas 1 \
            --max-replicas 1

      - name: Smoke deployed app
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "$APP_BASE_URL/api/health"
          curl --fail --show-error --silent "$APP_BASE_URL/api/health/dependencies"
          curl --fail --show-error --silent "$APP_BASE_URL/signin" > /dev/null
          curl --fail --show-error --silent "$APP_BASE_URL/guardian/home" > /dev/null
          curl --fail --show-error --silent "$APP_BASE_URL/routines" > /dev/null
