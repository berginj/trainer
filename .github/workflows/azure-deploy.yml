name: Azure Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target GitHub environment to deploy
        required: true
        type: choice
        options:
          - dev
          - test
          - staging
          - prod
      image_tag:
        description: Optional image tag override. Defaults to the commit SHA.
        required: false
        type: string
      run_migrations:
        description: Run Prisma migration gate before app rollout
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  build-image:
    name: Build And Push Image
    runs-on: ubuntu-latest
    needs: verify
    environment: ${{ inputs.environment }}
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}

      - name: Build and push image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${ACR_LOGIN_SERVER}/${CONTAINER_APP_NAME}:${IMAGE_TAG}"
          docker build --pull --tag "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
        env:
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-image
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep what-if
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f infra/main.bicep ]; then
            echo "infra/main.bicep is not present yet. Skipping Bicep what-if."
            exit 0
          fi
          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters "environmentName=${ENVIRONMENT_NAME}" "containerImage=${CONTAINER_IMAGE}"
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          ENVIRONMENT_NAME: ${{ inputs.environment }}
          CONTAINER_IMAGE: ${{ needs.build-image.outputs.image }}

      - name: Deploy Bicep
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f infra/main.bicep ]; then
            echo "infra/main.bicep is not present yet. Skipping Bicep deployment."
            exit 0
          fi
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters "environmentName=${ENVIRONMENT_NAME}" "containerImage=${CONTAINER_IMAGE}"
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          ENVIRONMENT_NAME: ${{ inputs.environment }}
          CONTAINER_IMAGE: ${{ needs.build-image.outputs.image }}

  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate migration command placeholder
        if: ${{ inputs.run_migrations }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret is not configured; migration gate cannot run yet."
            exit 1
          fi
          npm run prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Skip migration gate
        if: ${{ !inputs.run_migrations }}
        run: echo "Migration gate disabled for this manual deployment."

  deploy-app:
    name: Roll Out Container App
    runs-on: ubuntu-latest
    needs:
      - build-image
      - deploy-infra
      - migration-gate
    if: ${{ always() && needs.build-image.result == 'success' && needs.deploy-infra.result == 'success' && needs.migration-gate.result == 'success' }}
    environment: ${{ inputs.environment }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$CONTAINER_IMAGE"
        env:
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          CONTAINER_IMAGE: ${{ needs.build-image.outputs.image }}

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-app
    environment: ${{ inputs.environment }}

    steps:
      - name: Check health endpoint
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "${APP_BASE_URL}/api/health"
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}

      - name: Check dependency health endpoint
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "${APP_BASE_URL}/api/health/dependencies"
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
