name: Azure Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target GitHub environment to deploy
        required: true
        type: choice
        options:
          - dev
          - test
          - staging
          - prod
      image_tag:
        description: Optional image tag override. Defaults to the commit SHA.
        required: false
        type: string
      run_migrations:
        description: Run Prisma migration gate before app rollout
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: trainer-dev1-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  build-image:
    name: Build And Push Image
    runs-on: ubuntu-latest
    needs: deploy-infra
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.TRAINERDEV1_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.TRAINERDEV1_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.TRAINERDEV1_AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"
        env:
          ACR_NAME: ${{ vars.ACR_NAME || 'trainerdevacr' }}

      - name: Build and push image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${ACR_LOGIN_SERVER}/${CONTAINER_APP_NAME}:${IMAGE_TAG}"
          docker build --pull --tag "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
        env:
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER || 'trainerdevacr.azurecr.io' }}
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME || 'trainer-dev1' }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.TRAINERDEV1_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.TRAINERDEV1_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.TRAINERDEV1_AZURE_SUBSCRIPTION_ID }}

      - name: Resolve current Container App image
        shell: bash
        run: |
          set -euo pipefail
          image="$(az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.template.containers[0].image" \
            --output tsv)"
          if [ -z "$image" ]; then
            echo "Current Container App image could not be resolved."
            exit 1
          fi
          echo "CURRENT_CONTAINER_IMAGE=$image" >> "$GITHUB_ENV"
        env:
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME || 'trainer-dev1' }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-trainer-dev' }}

      - name: Bicep what-if
        shell: bash
        run: |
          set -euo pipefail
          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters \
              "environmentName=${ENVIRONMENT_NAME}" \
              "appName=${CONTAINER_APP_NAME}" \
              "acrName=${ACR_NAME}" \
              "containerImage=${CURRENT_CONTAINER_IMAGE}" \
              "containerAppEnvironmentId=${CONTAINER_APP_ENVIRONMENT_ID}" \
              "postgresServerName=${POSTGRES_SERVER_NAME}" \
              "postgresLocation=${POSTGRES_LOCATION}" \
              "enableRoleAssignments=${ENABLE_ROLE_ASSIGNMENTS}" \
              "postgresAdminPassword=${POSTGRES_ADMIN_PASSWORD}" \
              "authSecret=${AUTH_SECRET}" \
              "tokenEncryptionKey=${TOKEN_ENCRYPTION_KEY}" \
              "googleAuthClientId=${GOOGLE_AUTH_CLIENT_ID}" \
              "googleAuthClientSecret=${GOOGLE_AUTH_CLIENT_SECRET}" \
              "microsoftAuthClientId=${MICROSOFT_AUTH_CLIENT_ID}" \
              "microsoftAuthClientSecret=${MICROSOFT_AUTH_CLIENT_SECRET}" \
              "alertEmailAddress=${ALERT_EMAIL_ADDRESS}"
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-trainer-dev' }}
          ENVIRONMENT_NAME: ${{ inputs.environment }}
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME || 'trainer-dev1' }}
          ACR_NAME: ${{ vars.ACR_NAME || 'trainerdevacr' }}
          CONTAINER_APP_ENVIRONMENT_ID: ${{ vars.CONTAINER_APP_ENVIRONMENT_ID || '/subscriptions/b80cbfa1-0b2b-47ae-bd7f-5c896af0c092/resourceGroups/secretagent-rg/providers/Microsoft.App/managedEnvironments/secretagent-env' }}
          POSTGRES_SERVER_NAME: ${{ vars.POSTGRES_SERVER_NAME || 'trainer-dev1-pg' }}
          POSTGRES_LOCATION: ${{ vars.POSTGRES_LOCATION || 'centralus' }}
          ENABLE_ROLE_ASSIGNMENTS: ${{ vars.ENABLE_ROLE_ASSIGNMENTS || 'false' }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          GOOGLE_AUTH_CLIENT_ID: ${{ vars.GOOGLE_AUTH_CLIENT_ID }}
          GOOGLE_AUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_AUTH_CLIENT_SECRET }}
          MICROSOFT_AUTH_CLIENT_ID: ${{ vars.MICROSOFT_AUTH_CLIENT_ID || 'ccdda902-1f14-4bb8-a651-64ceb12e9f1d' }}
          MICROSOFT_AUTH_CLIENT_SECRET: ${{ secrets.MICROSOFT_AUTH_CLIENT_SECRET }}
          ALERT_EMAIL_ADDRESS: ${{ vars.ALERT_EMAIL_ADDRESS }}

      - name: Deploy Bicep
        shell: bash
        run: |
          set -euo pipefail
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters \
              "environmentName=${ENVIRONMENT_NAME}" \
              "appName=${CONTAINER_APP_NAME}" \
              "acrName=${ACR_NAME}" \
              "containerImage=${CURRENT_CONTAINER_IMAGE}" \
              "containerAppEnvironmentId=${CONTAINER_APP_ENVIRONMENT_ID}" \
              "postgresServerName=${POSTGRES_SERVER_NAME}" \
              "postgresLocation=${POSTGRES_LOCATION}" \
              "enableRoleAssignments=${ENABLE_ROLE_ASSIGNMENTS}" \
              "postgresAdminPassword=${POSTGRES_ADMIN_PASSWORD}" \
              "authSecret=${AUTH_SECRET}" \
              "tokenEncryptionKey=${TOKEN_ENCRYPTION_KEY}" \
              "googleAuthClientId=${GOOGLE_AUTH_CLIENT_ID}" \
              "googleAuthClientSecret=${GOOGLE_AUTH_CLIENT_SECRET}" \
              "microsoftAuthClientId=${MICROSOFT_AUTH_CLIENT_ID}" \
              "microsoftAuthClientSecret=${MICROSOFT_AUTH_CLIENT_SECRET}" \
              "alertEmailAddress=${ALERT_EMAIL_ADDRESS}"
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-trainer-dev' }}
          ENVIRONMENT_NAME: ${{ inputs.environment }}
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME || 'trainer-dev1' }}
          ACR_NAME: ${{ vars.ACR_NAME || 'trainerdevacr' }}
          CONTAINER_APP_ENVIRONMENT_ID: ${{ vars.CONTAINER_APP_ENVIRONMENT_ID || '/subscriptions/b80cbfa1-0b2b-47ae-bd7f-5c896af0c092/resourceGroups/secretagent-rg/providers/Microsoft.App/managedEnvironments/secretagent-env' }}
          POSTGRES_SERVER_NAME: ${{ vars.POSTGRES_SERVER_NAME || 'trainer-dev1-pg' }}
          POSTGRES_LOCATION: ${{ vars.POSTGRES_LOCATION || 'centralus' }}
          ENABLE_ROLE_ASSIGNMENTS: ${{ vars.ENABLE_ROLE_ASSIGNMENTS || 'false' }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          GOOGLE_AUTH_CLIENT_ID: ${{ vars.GOOGLE_AUTH_CLIENT_ID }}
          GOOGLE_AUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_AUTH_CLIENT_SECRET }}
          MICROSOFT_AUTH_CLIENT_ID: ${{ vars.MICROSOFT_AUTH_CLIENT_ID || 'ccdda902-1f14-4bb8-a651-64ceb12e9f1d' }}
          MICROSOFT_AUTH_CLIENT_SECRET: ${{ secrets.MICROSOFT_AUTH_CLIENT_SECRET }}
          ALERT_EMAIL_ADDRESS: ${{ vars.ALERT_EMAIL_ADDRESS }}

  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate migration command placeholder
        if: ${{ inputs.run_migrations }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret is not configured; migration gate cannot run yet."
            exit 1
          fi
          npm run prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Skip migration gate
        if: ${{ !inputs.run_migrations }}
        run: echo "Migration gate disabled for this manual deployment."

  deploy-app:
    name: Roll Out Container App
    runs-on: ubuntu-latest
    needs:
      - build-image
      - deploy-infra
      - migration-gate
    if: ${{ always() && needs.build-image.result == 'success' && needs.deploy-infra.result == 'success' && needs.migration-gate.result == 'success' }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.TRAINERDEV1_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.TRAINERDEV1_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.TRAINERDEV1_AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$CONTAINER_IMAGE"
        env:
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME || 'trainer-dev1' }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-trainer-dev' }}
          CONTAINER_IMAGE: ${{ needs.build-image.outputs.image }}

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-app

    steps:
      - name: Check health endpoint
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "${APP_BASE_URL}/api/health"
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://trainer-dev1.greenground-5002c3bc.eastus2.azurecontainerapps.io' }}

      - name: Check dependency health endpoint
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "${APP_BASE_URL}/api/health/dependencies"
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL || 'https://trainer-dev1.greenground-5002c3bc.eastus2.azurecontainerapps.io' }}
